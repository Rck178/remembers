<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recuerdo Interactivo</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      /* Diseño del botón inicial para desbloquear el video */
      #btn-iniciar {
        position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
        z-index: 9999; padding: 12px 24px; background: rgba(0,0,0,0.8); color: #D4AF37;
        border: 1px solid #D4AF37; border-radius: 6px; font-family: serif; font-size: 16px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <button id="btn-iniciar">Tocar para Iniciar Experiencia</button>

    <a-scene mindar-image="imageTargetSrc: targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="mivideo" src="video.mp4" loop crossorigin="anonymous" playsinline webkit-playsinline></video>
        
        <img id="icono-whatsapp" src="whatsapp.png" crossorigin="anonymous">
        <img id="icono-facebook" src="facebook.png" crossorigin="anonymous">
        <img id="icono-tiktok" src="tiktok.png" crossorigin="anonymous">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false">
        <a-entity cursor="fuse: false; rayOrigin: mouse;" raycaster="objects: .clickable"></a-entity>
      </a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#mivideo" position="0 0 0" width="1" height="1.5" rotation="0 0 0"></a-video>
        
        <a-image id="btn-whatsapp" class="clickable" src="#icono-whatsapp" position="-0.35 -1.0 0.05" width="0.2" height="0.2"></a-image>
        <a-image id="btn-facebook" class="clickable" src="#icono-facebook" position="0 -1.0 0.05" width="0.2" height="0.2"></a-image>
        <a-image id="btn-tiktok" class="clickable" src="#icono-tiktok" position="0.35 -1.0 0.05" width="0.2" height="0.2"></a-image>
      </a-entity>
    </a-scene>

    <script>
      const btnIniciar = document.querySelector("#btn-iniciar");
      const video = document.querySelector("#mivideo");

      // 1. Desbloquear video
      btnIniciar.addEventListener("click", function() {
        video.play();
        btnIniciar.style.display = "none";
      });

      // 2. Enlaces de Redes (Reemplaza con tus datos reales)
      document.querySelector('#btn-whatsapp').addEventListener('click', function () {
        window.location.href = 'https://wa.me/59177777777';
      });

      document.querySelector('#btn-facebook').addEventListener('click', function () {
        window.location.href = 'https://facebook.com/';
      });

      document.querySelector('#btn-tiktok').addEventListener('click', function () {
        window.location.href = 'https://tiktok.com/';
      });
    </script>
  </body>
</html>
